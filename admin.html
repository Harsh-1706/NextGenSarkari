<h2>Admin Panel - NextGen Sarkari</h2>

<h3>Add Job</h3>
<input id="title" placeholder="Job Title">
<input id="department" placeholder="Department">
<input id="state" placeholder="State">
<input id="last_date" placeholder="Last Date">
<input id="description" placeholder="Description">
<input id="apply_link" placeholder="Apply Link">
<input id="slug" placeholder="Slug">
<button onclick="addJob()">Add</button>

<hr>

<h3>Jobs</h3>
<div id="jobs"></div>

<script>
async function addJob() {
  await fetch("/api/add-job", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
  title: document.getElementById("title").value,
  department: document.getElementById("department").value,
  state: document.getElementById("state").value,
  last_date: document.getElementById("last_date").value,
  description: document.getElementById("description").value,
  apply_link: document.getElementById("apply_link").value,
  slug: document.getElementById("slug").value
})

  loadJobs();
}

async function loadJobs() {
  const res = await fetch("/api/get-jobs");
  const data = await res.json();

  document.getElementById("jobs").innerHTML =
    data.map(j =>
      `<p>${j.title} - ${j.location}
      <button onclick="deleteJob(${j.id})">Delete</button></p>`
    ).join("");
}

async function deleteJob(id) {
  await fetch("/api/delete-job", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  loadJobs();
}

loadJobs();
</script>
